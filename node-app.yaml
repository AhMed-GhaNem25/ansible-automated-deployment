---
# Playbook: Install Node.js, npm, and deploy the Node.js application
# Usage: sudo ansible-playbook -i hosts deploy-nodejs.yaml

- name: Install Node.js and npm
  hosts: your-server-ip
  become: yes
  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes
        force_apt_get: yes
        cache_valid_time: 3600

    - name: Install Node.js and npm
      apt:
        pkg:
          - nodejs
          - npm

- name: Deploy Node.js application
  hosts: your-server-ip
  become: yes
  vars_files:
    - "yourpath/Vars.yaml"
  tasks:

    - name: Copy and unpack the application artifact
      unarchive:
        src: "yourpath/simple-nodejs-app/{{ app_file }}.tgz"
        dest: "{{ dest_path }}"

    - name: Install application dependencies via npm
      npm:
        path: "{{ dest_path }}/package"

    - name: Start the application
      command:
        chdir: "{{ dest_path }}/package/app/"
        cmd: node server.js
      async: 45
      poll: 0

    - name: Verify the application is running
      shell: ps aux | grep node
      register: app_status

    - name: Print application status
      debug:
        msg: "App Status: {{ app_status.stdout }}"
